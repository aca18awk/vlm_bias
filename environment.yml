name: vlm_bias
channels:
  - conda-forge
  - defaults
dependencies:
  # 1. THE FOUNDATION
  - python=3.12.2
  - r-base=4.5.2
  - libgcc-ng
  - gxx_impl_linux-64
  
  # 2. THE R-STATS STACK
  - r-lme4
  - r-lmertest
  - r-ggplot2
  - r-dplyr
  
  # 3. THE PYTHON STACK 
  - pip
  - pip:
      - rpy2==3.6.7
      - pymer4==0.9.2
      
      # Deep Learning & VLMs 
      - torch==2.11.0
      - transformers==5.5.4
      - accelerate==1.13.0
      
      # Data & Science
      - pandas==3.0.1
      - numpy==2.4.4
      - scipy==1.17.1
      - statsmodels==0.14.6
      
      # Utilities & Document Generation
      - python-docx==1.2.0
      - pdf2image==1.17.0
      - matplotlib==3.10.8
      - seaborn==0.13.2
      - tqdm==4.67.3
